services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foru_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - foru_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foru_pos"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  foru_postgres:
